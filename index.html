<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/profilbild/cropped-dako2-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darmstadt kocht Profilbild 2025</title>
</head>
<body>

    <h3 style="margin: auto; font-family: 'jost-semi', sans-serif;">

    </h3>
    <div class="pbg-container" style="margin: auto;"></div>
  </div>
  <script type="text/javascript"
    src="https://unpkg.com/profile-picture-generator@1.5.0/dist/profile-picture-generator.js"

    crossorigin="anonymous"></script>
  <script type="application/javascript">
    (function () {
      window.ProfilePictureGenerator({
        container: document.querySelector('.pbg-container'),
        initialLanguage: 'de',
        languages: {
          de: {
            name: 'German',
            uploadButtonTitle: "Eigenes Profilbild generieren",
            downloadButtonTitle: "Profilbild herunterladen",
            imageAltText: "Darmstadt kocht 2025 Profilbild",
            fileName: "dako2025.png",
            templateUrl: "https://darmstadtkocht.github.io/profilbild/dako2025dc.png",
            imagePreview: "https://darmstadtkocht.github.io/profilbild/dako2025dc.png",
            privacyNote: "Die ausgewählte Datei wird an keinen Server versendet. Die gesamte Bildgenerierung findet im Browser statt.",
            privacyLinkText: "Datenschutzerklärung"
          },
          en: {
            name: 'English',
            templateUrl: "https://darmstadtkocht.github.io/profilbild/dako2025dc.png",
            imagePreview: "https://darmstadtkocht.github.io/profilbild/dako2025dc.png",
          }
        }

    })();
